name: Build

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  windows-build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup CMake
        uses: lukka/get-cmake@latest
      # Ninja is single-config: this is a true Release build (/O2 on MSVC), unlike
      # many local IDE defaults (Debug). Reproduce CI behavior locally with:
      #   cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
      - name: Configure
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
      - name: Build
        run: cmake --build build --config Release
      - name: Prepare runtime assets
        shell: pwsh
        run: |
          $dest = "build/bin/assets"
          foreach ($src in @("Sandbox/assets", "MochiiEditor/assets")) {
            if (Test-Path $src) {
              New-Item -ItemType Directory -Path $dest -Force | Out-Null
              Copy-Item -Path "$src/*" -Destination $dest -Recurse -Force
            }
          }
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: mochii-windows-build
          path: build/bin
          if-no-files-found: error
