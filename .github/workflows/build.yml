name: Build

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  windows-build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup CMake
        uses: lukka/get-cmake@latest
      - name: Configure
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
      - name: Build
        run: cmake --build build --config Release
      - name: Copy MinGW runtime DLLs
        shell: pwsh
        run: |
          $mingwBin = "C:\msys64\mingw64\bin"
          $dlls = @(
            "libgcc_s_seh-1.dll",
            "libstdc++-6.dll",
            "libwinpthread-1.dll"
          )
          foreach ($dll in $dlls) {
            $src = Join-Path $mingwBin $dll
            if (Test-Path $src) {
              Copy-Item $src -Destination "build/bin/" -Force
              Write-Host "Copied $dll"
            } else {
              Write-Warning "$dll not found at $src"
            }
          }
      - name: Prepare runtime assets
        shell: pwsh
        run: |
          if (Test-Path "Sandbox/assets") {
            New-Item -ItemType Directory -Path "build/bin/assets" -Force | Out-Null
            Copy-Item -Path "Sandbox/assets/*" -Destination "build/bin/assets" -Recurse -Force
          }
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: mochii-windows-build
          path: build/bin
          if-no-files-found: error
