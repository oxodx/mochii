name: Daily Release

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

env:
  SOLUTION_FILE_PATH: .
  BUILD_CONFIGURATION: Release

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Add MSBuild to PATH
      uses: microsoft/setup-msbuild@v1.0.2

    - name: Restore NuGet packages
      working-directory: ${{env.GITHUB_WORKSPACE}}
      run: nuget restore ${{env.SOLUTION_FILE_PATH}}

    - name: Build
      working-directory: ${{env.GITHUB_WORKSPACE}}
      run: msbuild /m /p:Configuration=${{env.BUILD_CONFIGURATION}} ${{env.SOLUTION_FILE_PATH}}

    - name: Create and push tag
      id: create_tag
      env:
        REPO_URL: https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
      shell: pwsh
      run: |
        $tag = "v$(Get-Date -Format 'yyyy.MM.dd')"
        git config user.name $env:GITHUB_ACTOR
        git config user.email "$($env:GITHUB_ACTOR)@users.noreply.github.com"
        git remote set-url origin $env:REPO_URL
        git fetch --prune
        $exists = (& git ls-remote --tags origin refs/tags/$tag) -ne $null -and (& git ls-remote --tags origin refs/tags/$tag).Trim().Length -gt 0
        if ($exists) {
          Write-Host "Tag $tag already exists on remote. Skipping creation."
        } else {
          git tag -a $tag -m "Daily release $tag"
          git push origin $tag
        }
        echo "tag=$tag" >> $env:GITHUB_OUTPUT

    - name: Create GitHub release
      uses: actions/create-release@v1
      with:
        tag_name: ${{ steps.create_tag.outputs.tag }}
        release_name: Daily Release ${{ steps.create_tag.outputs.tag }}
        body: Automated daily release.
        draft: false
        prerelease: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
