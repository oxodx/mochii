name: Daily Release

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

env:
  SOLUTION_FILE_PATH: .
  BUILD_CONFIGURATION: Release

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Install Visual Studio 2026 Build Tools
      shell: pwsh
      run: |
        Write-Host "Installing VS 2026 Build Tools..."
        choco install visualstudio2026buildtools `
          --package-parameters "--add Microsoft.VisualStudio.Workload.VCTools --add Microsoft.VisualStudio.Component.VC.Tools.x86.x64 --includeRecommended --quiet" `
          -y --ignore-package-exit-codes=3010
        Write-Host "VS 2026 Build Tools installation completed"

    - name: Install scoop and premake
      shell: pwsh
      run: |
        Set-ExecutionPolicy -ExecutionPolicy RemoteSigned -Scope CurrentUser
        Invoke-RestMethod -Uri https://get.scoop.sh | Invoke-Expression
        Write-Host "Installing premake..."
        scoop install premake5
        Write-Host "premake installation completed"

    - name: Verify VS 2026 Installation
      shell: pwsh
      run: |
        $vs2026Path = "C:\Program Files (x86)\Microsoft Visual Studio\18\BuildTools\Common7\Tools\VsDevCmd.bat"
        if (Test-Path $vs2026Path) {
          Write-Host "VS 2026 Build Tools found at: $vs2026Path"
        } else {
          Write-Host "VS 2026 Build Tools not found at expected location"
          exit 1
        }

    - name: Build with VS 2026
      shell: pwsh
      run: |
        Write-Host "Running premake5..."
        premake5 vs2026
        
        Write-Host "Setting up VS 2026 and building..."
        $vsDevCmd = "C:\Program Files (x86)\Microsoft Visual Studio\18\BuildTools\Common7\Tools\VsDevCmd.bat"
        & cmd /c """$vsDevCmd"" && msbuild /m /p:Configuration=${{ env.BUILD_CONFIGURATION }} /p:Platform=x64 ${{ env.SOLUTION_FILE_PATH }}"

    - name: Create and push tag
      id: create_tag
      env:
        REPO_URL: https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
      shell: pwsh
      run: |
        $tag = "v$(Get-Date -Format 'yyyy.MM.dd')"
        git config user.name $env:GITHUB_ACTOR
        git config user.email "$($env:GITHUB_ACTOR)@users.noreply.github.com"
        git remote set-url origin $env:REPO_URL
        git fetch --prune --tags
        $exists = git rev-parse --verify --quiet refs/tags/$tag
        if ($exists) {
          Write-Host "Tag $tag already exists. Skipping creation."
        } else {
          git tag -a $tag -m "Daily release $tag"
          git push origin $tag
        }
        echo "tag=$tag" >> $env:GITHUB_OUTPUT

    - name: Create GitHub release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.create_tag.outputs.tag }}
        name: Daily Release ${{ steps.create_tag.outputs.tag }}
        body: Automated daily release built with VS2026.
        draft: false
        prerelease: true
        files: |
          **/bin/**/*.exe
          **/bin/**/*.dll
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
